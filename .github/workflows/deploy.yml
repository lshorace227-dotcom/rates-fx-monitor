name: Build & Deploy to Pages

on:
  schedule:
    - cron: "0 4 * * *"      # 每天 04:00 UTC = 澳门/香港 12:00（UTC+8）
  workflow_dispatch:          # 允许手动触发
  push:
    branches: [main]          # 代码改动时也重建部署

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build snapshot (fetch data + quant insights)
        run: node build-snapshot.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
