<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>利率与汇率监控仪表盘</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <header>
    <div class="header-row">
      <h1>利率与汇率监控仪表盘</h1>
      <div id="status-bar">
        <span id="mode-badge" class="mode-badge">…</span>
        <button id="refresh-btn" title="重新加载数据">⟳ 刷新</button>
      </div>
    </div>
    <p class="disclaimer">数据无需 API key（纽约联储 / Yahoo / HKMA / 本地）；研判非投资建议。点击卡片可加入/移出图表。</p>
  </header>

  <section id="overview">
    <h2>概览</h2>
    <div class="group-title">利率</div>
    <div id="cards-利率" class="card-group"></div>
    <div class="group-title">汇率</div>
    <div id="cards-汇率" class="card-group"></div>
  </section>

  <section id="chart-section">
    <h2>时间序列</h2>
    <div id="presets">
      <span class="presets-label">预设视图：</span>
      <button data-preset="ust">美债收益率曲线</button>
      <button data-preset="cnus">中美政策利率</button>
      <button data-preset="hkus">港美短端</button>
      <button data-preset="fx">人民币与美元</button>
    </div>
    <div id="picker"></div>
    <div id="chart-toolbar">
      <div id="ranges">
        <button data-range="1M">1M</button><button data-range="3M">3M</button>
        <button data-range="6M">6M</button><button data-range="1Y" class="active">1Y</button>
        <button data-range="5Y">5Y</button><button data-range="ALL">全部</button>
      </div>
      <label id="chart-opts"><input type="checkbox" id="normalize"/> 指数化对比（基准=100）</label>
    </div>
    <div id="chart"></div>
  </section>

  <section id="insight-section">
    <h2>AI 研判（四档 × 三情景）</h2>
    <div id="insight-controls">
      <select id="insight-id"></select>
      <label><input type="checkbox" id="insight-news" checked/> 含实时新闻（更慢）</label>
      <button id="insight-run">生成研判</button>
      <span id="insight-status"></span>
    </div>
    <div id="insight-output"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
